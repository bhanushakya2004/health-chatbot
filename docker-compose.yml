version: '3.8'

services:
  backend:
    build: ./healthcare-api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DATABASE_NAME=healthcare_db
      - SECRET_KEY=your-secret-key-here-change-in-production
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - mongo

  frontend:
    build: ./medicare-chat
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
